name: Build WordPicker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild -project WordPicker.xcodeproj \
            -scheme WordPicker \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create app bundle
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/WordPicker.app dist/

      - name: Create ZIP archive
        run: |
          cd dist
          zip -r WordPicker.zip WordPicker.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WordPicker-app
          path: dist/WordPicker.zip
          retention-days: 30
